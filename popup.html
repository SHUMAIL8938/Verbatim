<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verbatim</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      width: 300px;
      min-height: 100px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #21262d;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo {
      width: 30px; height: 30px;
      background: #1a1f2e;
      border-radius: 8px;
      border: 1px solid #30363d;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .name { font-size: 14px; font-weight: 600; color: #e6edf3; }
    .tagline { font-size: 11px; color: #7d8590; margin-top: 1px; }

    /* ── Main toggle ── */
    .toggle-track {
      width: 42px; height: 24px;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
      background: #30363d;
    }
    .toggle-track.on { background: #4f8ef7; }
    .toggle-thumb {
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 3px; left: 3px;
      transition: left 0.2s;
    }
    .toggle-track.on .toggle-thumb { left: 21px; }

    /* ── Mini toggle ── */
    .mini-track {
      width: 30px; height: 17px;
      border-radius: 9px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
      background: #30363d;
    }
    .mini-track.on { background: #4f8ef7; }
    .mini-thumb {
      width: 13px; height: 13px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: left 0.15s;
    }
    .mini-track.on .mini-thumb { left: 15px; }

    /* ── Sections ── */
    .section { padding: 12px 16px; border-bottom: 1px solid #21262d; }
    .section-label {
      font-size: 10px;
      color: #7d8590;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 500;
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
    }
    .row-label { font-size: 12px; color: #c9d1d9; }

    /* ── Select ── */
    select {
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-size: 11px;
      border-radius: 6px;
      padding: 3px 6px;
      outline: none;
      cursor: pointer;
      max-width: 140px;
    }
    select:hover { border-color: #484f58; }

    /* ── Theme pills ── */
    .theme-pills { display: flex; gap: 6px; }
    .pill {
      font-size: 11px;
      padding: 3px 12px;
      border-radius: 20px;
      cursor: pointer;
      border: 1px solid #30363d;
      color: #7d8590;
      background: transparent;
      transition: all 0.15s;
    }
    .pill.active-dark  { background: #1a1f2e; color: #c9d1d9; border-color: #4f8ef7; }
    .pill.active-light { background: #f0f2f4; color: #333;    border-color: #4f8ef7; }

    /* ── Saved words ── */
    .saved-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .export-btn {
      font-size: 10px;
      color: #7d8590;
      background: none;
      border: 1px solid #30363d;
      border-radius: 5px;
      padding: 3px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: all 0.15s;
    }
    .export-btn:hover { color: #e6edf3; border-color: #484f58; }

    .saved-list { display: flex; flex-direction: column; }
    .saved-word {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid #161b22;
    }
    .saved-word:last-child { border-bottom: none; }
    .word-text { font-size: 13px; color: #c9d1d9; font-weight: 500; }
    .word-pos  { font-size: 10px; color: #7d8590; margin-top: 1px; }
    .remove-btn {
      font-size: 16px;
      color: #484f58;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
    }
    .remove-btn:hover { color: #e85555; }

    .empty-state {
      text-align: center;
      padding: 14px 0 6px;
      font-size: 12px;
      color: #484f58;
      line-height: 1.5;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .clear-btn {
      font-size: 11px;
      color: #7d8590;
      background: none;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .clear-btn:hover { color: #e85555; border-color: #e85555; }
    .version { font-size: 10px; color: #484f58; }

    /* ── Disabled state ── */
    body.disabled .section,
    body.disabled .footer .clear-btn {
      opacity: 0.4;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
          <rect width="128" height="128" rx="24" fill="#1a1f2e"/>
          <rect x="22" y="38" width="58" height="7" rx="3.5" fill="#4f8ef7"/>
          <rect x="22" y="52" width="58" height="7" rx="3.5" fill="#ffffff" opacity="0.3"/>
          <rect x="84" y="52" width="22" height="7" rx="3.5" fill="#4f8ef7" opacity="0.6"/>
          <rect x="22" y="66" width="38" height="7" rx="3.5" fill="#ffffff" opacity="0.3"/>
          <rect x="64" y="66" width="28" height="7" rx="3.5" fill="#4f8ef7" opacity="0.6"/>
          <rect x="16" y="80" width="96" height="28" rx="10" fill="#4f8ef7"/>
          <text x="64" y="99" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="18" fill="#ffffff">V</text>
        </svg>
      </div>
      <div>
        <div class="name">Verbatim</div>
        <div class="tagline">Instant definitions</div>
      </div>
    </div>
    <div class="toggle-track" id="mainToggle">
      <div class="toggle-thumb"></div>
    </div>
  </div>

  <div class="section" id="prefsSection">
    <div class="section-label">Preferences</div>

    <div class="row">
      <span class="row-label">Translate definitions to</span>
      <select id="langSelect">
        <option value="">English (off)</option>
        <option value="hi">Hindi</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ar">Arabic</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
      </select>
    </div>

    <div class="row" style="margin-top: 4px;">
      <span class="row-label">Tooltip theme</span>
      <div class="theme-pills">
        <div class="pill active-dark" id="pillDark" data-theme="dark">Dark</div>
        <div class="pill" id="pillLight" data-theme="light">Light</div>
      </div>
    </div>

    <div class="row" style="margin-top: 4px;">
      <span class="row-label">Show example sentences</span>
      <div class="mini-track on" id="examplesToggle">
        <div class="mini-thumb"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="saved-header">
      <div class="section-label" style="margin-bottom:0;">Saved words</div>
      <button class="export-btn" id="exportBtn">&#8595; Export CSV</button>
    </div>
    <div class="saved-list" id="savedList"></div>
  </div>

  <div class="footer">
    <button class="clear-btn" id="clearBtn">Clear history</button>
    <span class="version">v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
